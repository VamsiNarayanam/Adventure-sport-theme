<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Page not found — Stackly Adventure">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0a1214">
  <title>Page not found — Stackly Adventure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/premium.css">
  <link rel="stylesheet" href="css/premium-responsive.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.1/dist/aos.css">
</head>
<body class="page-inner premium-theme">

  <div id="preloader" aria-hidden="true">
    <div class="preloader__curtain preloader__curtain--left" aria-hidden="true"></div>
    <div class="preloader__curtain preloader__curtain--right" aria-hidden="true"></div>
    <div class="preloader__scanline" aria-hidden="true"></div>
    <div class="preloader__stage">
      <div class="preloader__ring" aria-hidden="true">
        <span class="preloader__ring-track"></span>
        <span class="preloader__ring-arc"></span>
        <img class="preloader__logo" src="images/stackly-adventure.webp" alt="Stackly Adventure" width="200" height="50" decoding="async">
      </div>
      <div class="preloader__progress" role="progressbar" aria-label="Loading" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <span class="preloader__progress-track"></span>
        <span class="preloader__progress-fill"></span>
      </div>
      <p class="preloader__tagline">Explore Further. Climb Higher. Live Wilder.</p>
    </div>
  </div>



  <main class="site-main error-page">
    <h1>404</h1>
    <h2>Trail not found</h2>
    <p class="lead error-page__lead">This route doesn't exist on our map. The page may have moved, or you may have taken a wrong turn off the beaten path.</p>
    <div class="error-page__actions">
      <a class="btn btn--primary" href="index.html">Back to home</a>
      <button type="button" class="btn btn--outline-dark" id="error-go-back">Go back</button>
    </div>
  </main>


  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.1/dist/aos.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
